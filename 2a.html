<!DOCTYPE html>
<html>
<head>
<title>Table Example</title>
</head>

<body>

<h2>Table Example</h2>

<p>In this example, we will demonstrate how to use tables in HTML.</p>

<table border="1">

<tr>
<th>Column 1</th>
<th>Column 2</th>
<th>Column 3</th>
</tr>

<tr>
<td>Row 1, Cell 1</td>
<td>Row 1, Cell 2</td>
<td>Row 1, Cell 3</td>
</tr>

<tr>
<td>Row 2, Cell 1</td>
<td>Row 2, Cell 2</td>
<td>Row 2, Cell 3</td>
</tr>

<tr>
<td rowspan="2" colspan="2">Row 3, Cell 1 (spanned)</td>
<td>Row 3, Cell 3</td>
</tr>

</table>

</body>
</html>
