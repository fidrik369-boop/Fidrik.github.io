<!DOCTYPE html>
<html>
<head>
<title>Timetable Table</title>

<style>
table {
border-collapse: collapse;
width: 50%;
margin: 20px auto;
}

th, td {
border: 1px solid black;
padding: 8px;
text-align: center;
}

caption {
font-size: 1.2em;
font-weight: bold;
margin-bottom: 10px;
}
</style>

</head>

<body>

<h2>Timetable Table Example</h2>

<table cellspacing="0" cellpadding="5" border="1">

<caption>Class Timetable</caption>

<tr>
<th>Time</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
</tr>

<tr>
<td>9:00 - 10:00</td>
<td rowspan="2">Math</td>
<td>Science</td>
<td colspan="2">English</td>
<td rowspan="2">History</td>
</tr>

<tr>
<td>10:00 - 11:00</td>
<td>Art</td>
<td>PE</td>
<td>Music</td>
</tr>

</table>

</body>
</html>
